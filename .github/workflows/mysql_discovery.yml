name: Start MySQL

on:
  workflow_dispatch:

jobs:
  mysql:
    runs-on: windows-2022

    steps:
      - name: Create data directory
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path C:\mysql-data

      - name: Initialize MySQL
        shell: powershell
        run: |
          & "C:\Program Files\MySQL\MySQL Server 8.0\bin\mysqld.exe" `
            --initialize-insecure `
            --datadir=C:\mysql-data

      - name: Start MySQL
        shell: powershell
        run: |
          Start-Process `
            -FilePath "C:\Program Files\MySQL\MySQL Server 8.0\bin\mysqld.exe" `
            -ArgumentList "--datadir=C:\mysql-data","--port=3306"

      - name: Wait
        shell: powershell
        run: |
          Start-Sleep 15

      - name: Verify process
        shell: powershell
        run: |
          Get-Process mysqld

      - name: Test connection
        shell: powershell
        run: |
          & "C:\Program Files\MySQL\MySQL Server 8.0\bin\mysql.exe" `
            -u root `
            -e "SELECT VERSION();"