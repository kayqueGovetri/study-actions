name: MySQL Windows Test

on:
  workflow_dispatch:

jobs:
  mysql:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MySQL
        uses: kayqueGovetri/setup-mysql@fix/entrypoint-ps1
        with:
          mysql_root_password: 'root'
          mysql_database: 'my_db'
          mysql_user: 'teste'
          mysql_password: '123'
          mysql_port: 32768


      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run application
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 32768
          MYSQL_USER: teste
          MYSQL_PASSWORD: 123
          MYSQL_DATABASE: my_db
        run: python main.py